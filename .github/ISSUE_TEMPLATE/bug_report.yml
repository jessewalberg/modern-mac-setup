name: Setup problem
description: Report a reproducible problem in the guide or scripts
title: "[Setup]: "
labels:
  - bug
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Remove credentials, private repository names, internal hosts, serial numbers,
        recovery keys, and personal data before submitting diagnostics.
  - type: input
    id: macos
    attributes:
      label: macOS version and build
      placeholder: "26.x (build ...)"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple silicon (native)
        - Intel (native)
        - Rosetta-translated process
        - Unknown
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted output
      render: text
    validations:
      required: true
  - type: textarea
    id: investigation
    attributes:
      label: Checks already performed
      description: Include relevant read-only audit output after redaction.
