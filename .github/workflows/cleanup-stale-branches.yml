name: One-time stale branch cleanup

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup-stale-branches.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Delete stale agent branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name' |
          while IFS= read -r branch; do
            case "$branch" in
              agent/*)
                echo "Deleting ${branch}"
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}"
                ;;
            esac
          done
