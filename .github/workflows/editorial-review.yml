name: Editorial review reminder

on:
  schedule:
    - cron: "23 11 5 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      review_type:
        description: Review type
        required: false
        default: quarterly
        type: choice
        options:
          - quarterly
          - major-macos-release
          - annual-clean-machine
          - bootstrap-security

permissions:
  contents: read
  issues: write

jobs:
  open-review:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Open editorial review issue
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_TYPE: ${{ inputs.review_type || 'quarterly' }}
        run: |
          period="$(date -u '+%Y Q'$((($(date -u +%-m)-1)/3+1)))"
          title="Editorial setup review: $period"
          if gh issue list --state open --search "$title in:title" --json title --jq '.[].title' | grep -Fxq "$title"; then
            echo "An open review issue already exists for $period."
            exit 0
          fi

          cat > editorial-review.md <<EOF
          # $REVIEW_TYPE review

          Automated checks establish bounded technical evidence. This review decides whether the instructions and recommendations remain good.

          ## Platform and bootstrap

          - [ ] Confirm supported macOS versions and Apple silicon/Intel policy.
          - [ ] Review changes in the latest macOS and Command Line Tools releases.
          - [ ] Verify Apple Git remains a sufficient bootstrap/default Git.
          - [ ] Confirm native Homebrew prefixes and wrong-architecture rejection.
          - [ ] Review the pinned Homebrew installer commit and blob.
          - [ ] Confirm System Settings names, availability by macOS version, and privacy prompts.

          ## Packages and applications

          - [ ] Review the monthly freshness issue and unresolved tokens.
          - [ ] Confirm each recommended app's vendor, ownership, license, update channel, and architecture support.
          - [ ] Review requested permissions, login items, extensions, and uninstall behavior.
          - [ ] Look for safer, simpler, native, or open-source alternatives.
          - [ ] Confirm competing tools remain explicit choices.
          - [ ] Remove recommendations that no longer earn their maintenance or security cost.

          ## Guidance and evidence

          - [ ] Walk the README path and every documentation link.
          - [ ] Confirm primary sources for platform-sensitive statements.
          - [ ] Verify that hosted runner tests are not described as clean-Mac tests.
          - [ ] Confirm examples, expected outputs, negative cases, and troubleshooting steps.
          - [ ] Update human-review dates only after completing this review.

          ## Clean-machine acceptance

          Complete this section for annual, major macOS, or material bootstrap changes.

          - [ ] Follow docs/acceptance-test.md on a clean or disposable Mac.
          - [ ] Test preflight, minimal foundation, new-shell persistence, and post-bootstrap audit.
          - [ ] Test optional CLI and Homebrew Git separately.
          - [ ] Test one representative reviewed application file.
          - [ ] Test rerun, backup, recovery, and removal behavior.
          - [ ] Record expected warnings and redact all personal or organizational data.

          Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          EOF

          gh issue create --title "$title" --body-file editorial-review.md
