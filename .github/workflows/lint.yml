name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Check shell syntax
        run: find scripts tests -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh tests/*.sh

      - name: Check shell formatting
        env:
          SHFMT_VERSION: "3.13.1"
        run: |
          go install "mvdan.cc/sh/v3/cmd/shfmt@v${SHFMT_VERSION}"
          "$(go env GOPATH)/bin/shfmt" -d -i 2 -ci scripts tests

      - name: Run Linux smoke tests
        run: ./tests/smoke.sh

      - name: Lint Markdown
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
        run: npx --yes markdownlint-cli2@0.23.1 "**/*.md" "#.git"
