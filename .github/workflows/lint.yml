name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned shell tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          cache: true
          install_args: shellcheck shfmt

      - name: Check shell syntax
        run: bash -n scripts/*.sh scripts/lib/*.sh tests/*.sh

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh scripts/lib/*.sh tests/*.sh

      - name: Check shell formatting
        run: shfmt -d -i 2 -ci scripts tests

  catalog:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Ruby
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          cache: true
          install_args: ruby

      - name: Validate package catalog
        run: ruby scripts/validate-catalog.rb

  regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run isolated regression tests
        run: |
          set +e
          ./tests/smoke.sh >"$RUNNER_TEMP/regression.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/regression.log"
          exit "$status"

      - name: Upload regression diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: regression-diagnostics
          path: ${{ runner.temp }}/regression.log
          retention-days: 7

  markdown:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned Node.js
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          cache: true
          install_args: node

      - name: Lint Markdown
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
        run: npx --yes markdownlint-cli2@0.23.1 "**/*.md" "#.git"
